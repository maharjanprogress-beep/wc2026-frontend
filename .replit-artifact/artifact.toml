kind = "mobile"
previewPath = "/"
title = "WC 2026 Predictor"
version = "1.0.0"
id = "artifacts/wc2026"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20520

[services.development]
run = "pnpm --filter @workspace/wc2026 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wc2026", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/wc2026", "run", "serve" ]

[services.env]
PORT = "20520"
BASE_PATH = "/"
